<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">

  <!-- OUTER DIAMOND -->
  <polygon
    points="250,28 472,250 250,472 28,250"
    fill="none"
    stroke="#4ADE80"
    stroke-width="7"
    stroke-linejoin="miter"
  />

  <!-- TOP NODE -->
  <circle cx="250" cy="28" r="13" fill="none" stroke="#4ADE80" stroke-width="7"/>

  <!-- BOTTOM NODE -->
  <circle cx="250" cy="472" r="13" fill="none" stroke="#4ADE80" stroke-width="7"/>

  <!-- INNER DIAMOND (smaller, same centre) -->
  <polygon
    points="250,105 395,250 250,395 105,250"
    fill="none"
    stroke="#4ADE80"
    stroke-width="4"
    stroke-linejoin="miter"
    opacity="0.85"
  />

  <!-- LEFT OPEN BRACKET < -->
  <polyline
    points="162,193 105,250 162,307"
    fill="none"
    stroke="#4ADE80"
    stroke-width="7"
    stroke-linejoin="miter"
    stroke-linecap="butt"
  />

  <!-- RIGHT OPEN BRACKET > -->
  <polyline
    points="338,193 395,250 338,307"
    fill="none"
    stroke="#4ADE80"
    stroke-width="7"
    stroke-linejoin="miter"
    stroke-linecap="butt"
  />

  <!-- ═══ N LETTER (filled shape, italic-slanted) ═══ -->
  <polygon
    points="
      148,318
      148,175
      175,175
      240,285
      240,175
      268,175
      268,318
      240,318
      175,208
      175,318
    "
    fill="#4ADE80"
  />

  <!-- ═══ X LETTER (filled shape, two crossing bars) ═══ -->
  <!-- Top-left to bottom-right bar -->
  <polygon
    points="
      278,175  308,175
      368,318  338,318
    "
    fill="#4ADE80"
  />
  <!-- Top-right to bottom-left bar -->
  <polygon
    points="
      338,175  368,175
      308,318  278,318
    "
    fill="#4ADE80"
  />
  <!-- Centre fill to close X gap -->
  <polygon
    points="
      308,175  338,175
      338,318  308,318
    "
    fill="none"
  />

</svg>
