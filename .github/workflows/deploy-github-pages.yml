# Avaldab moodul3/ staatilise saidi GitHub Pagesile (project site).
# Repo: https://github.com/Taan1el/proovieksam_multimeedia_2024
# URL pärast seadistamist: https://Taan1el.github.io/proovieksam_multimeedia_2024/

name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload moodul3
        uses: actions/upload-pages-artifact@v3
        with:
          path: moodul3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
